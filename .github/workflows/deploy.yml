name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── 架构门禁 (来自 converge-core) ──
      - name: Architecture Gate
        run: bash vendor/converge/core/scripts/ci/enforce-architecture.sh

      # ── 构建 Docker 镜像 ──
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_REGISTRY }}/${{ github.event.repository.name }}:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_REGISTRY }}/${{ github.event.repository.name }}:${{ github.sha }} \
                     ${{ secrets.DOCKER_REGISTRY }}/${{ github.event.repository.name }}:latest

      # ── 部署 (金丝雀 + 健康检查) ──
      - name: Deploy
        run: |
          echo "Deploy to server..."
          # 替换为你的部署命令 (SSH / SCP / Docker Compose)
          # 参考: templates/deployment/ 下的 A+B+C 三层模板
